unit_cell:
  # Experimental room-temperature (~300 K) lattice constant of silicon,
  # a = 5.431 A. This is the 8-atom conventional (cubic) diamond cell, the same
  # cell as the VASP Si-PBEsol example, so the results can be compared directly.
  lattice:
    - [5.431000000000000, 0.000000000000000, 0.000000000000000] # a
    - [0.000000000000000, 5.431000000000000, 0.000000000000000] # b
    - [0.000000000000000, 0.000000000000000, 5.431000000000000] # c
  points:
    - symbol: Si # 1
      coordinates: [0.000000000000000, 0.000000000000000, 0.000000000000000]
    - symbol: Si # 2
      coordinates: [0.000000000000000, 0.500000000000000, 0.500000000000000]
    - symbol: Si # 3
      coordinates: [0.500000000000000, 0.000000000000000, 0.500000000000000]
    - symbol: Si # 4
      coordinates: [0.500000000000000, 0.500000000000000, 0.000000000000000]
    - symbol: Si # 5
      coordinates: [0.250000000000000, 0.250000000000000, 0.250000000000000]
    - symbol: Si # 6
      coordinates: [0.250000000000000, 0.750000000000000, 0.750000000000000]
    - symbol: Si # 7
      coordinates: [0.750000000000000, 0.250000000000000, 0.750000000000000]
    - symbol: Si # 8
      coordinates: [0.750000000000000, 0.750000000000000, 0.250000000000000]

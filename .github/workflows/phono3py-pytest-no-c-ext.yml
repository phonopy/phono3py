name: Pytest with PHONO3PY_NO_C_EXT (Rust-only backend)

# Run the test suite against a wheel built with PHONO3PY_NO_C_EXT=1.
# Verifies that lang="Rust" via phonors covers every dispatch site that
# the C extension used to.  Anything that fails here is a missing
# Rust-port site (per phono3py_RUST_MIGRATION.md, Phase 5A).

on:
  pull_request:
    branches: [develop]

jobs:
  build-linux-no-c:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v5
        with:
          # setuptools_scm needs tags to compute the phono3py version;
          # actions/checkout's default shallow clone hides them.
          fetch-depth: 0
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: test
          auto-activate-base: false
          miniforge-version: latest
          python-version: ${{ matrix.python-version }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependent packages
        run: |
          conda activate test
          conda install --yes python=${{ matrix.python-version }}
          conda install --yes matplotlib-base pyyaml h5py numpy scipy pytest spglib pypolymlp
          pip install maturin
      - name: Install symfc develop branch
        run: |
          conda activate test
          git clone --depth 1 https://github.com/symfc/symfc.git
          cd symfc
          pip install -e . -vvv
      - name: Install phonopy develop branch without C extension
        env:
          PHONOPY_NO_C_EXT: "1"
          CMAKE_GENERATOR: "Unix Makefiles"
        run: |
          conda activate test
          git clone https://github.com/phonopy/phonopy.git
          cd phonopy
          pip install -e . -vvv
      - name: Clone phonors repository
        run: |
          git clone --depth 1 https://github.com/phonopy/phonors.git ../phonors
      - name: Build and install phonors
        run: |
          conda activate test
          cd ../phonors
          maturin develop --release
      - name: Install phono3py without C extension
        env:
          PHONO3PY_NO_C_EXT: "1"
          # Force the Make generator so scikit-build-core does not look
          # for Ninja.  CMakeLists.txt early-returns under
          # PHONO3PY_NO_C_EXT=1, so no actual compilation happens.
          CMAKE_GENERATOR: "Unix Makefiles"
        run: |
          conda activate test
          pip install -e . -vvv
      - name: Verify C extensions are absent
        run: |
          conda activate test
          python -c "
          for mod in ('phonopy._phonopy', 'phonopy._recgrid', 'phono3py._phono3py', 'phono3py._phononcalc'):
              try:
                  __import__(mod)
              except ImportError:
                  print(f'OK: {mod} is absent.')
              else:
                  raise SystemExit(f'{mod} was unexpectedly built.')
          "
      - name: Test with pytest (Rust backend)
        run: |
          conda activate test
          pytest test

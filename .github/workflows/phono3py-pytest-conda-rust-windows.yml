name: Pytest with Rust backend on Windows (smoke test)

on:
  pull_request:
    branches: [ develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: ["3.12"]  # Use 3.12 to avoid _tkinter.TclError seen in the C-only Windows workflow

    steps:
    - uses: actions/checkout@v5
    # Use conda-incubator/setup-miniconda for precise control of conda infrastructure
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install dependent packages
      run: |
        conda activate test
        conda install --yes python=${{ matrix.python-version }}
        conda install --yes matplotlib-base pyyaml h5py numpy scipy pytest spglib cmake c-compiler cxx-compiler
        pip install maturin
    - name: Install phonopy develop branch
      run: |
        conda activate test
        git clone https://github.com/phonopy/phonopy.git
        cd phonopy
        pip install -e . -vvv
        cd ..
    - name: Build and install phono3py_rs
      run: |
        conda activate test
        cd rust
        maturin develop --release
        cd ..
    - name: Install phono3py
      run: |
        conda activate test
        pip install -e . -vvv
    - name: Verify phono3py_rs import
      run: |
        conda activate test
        python -c "import phono3py_rs; print('phono3py_rs import OK')"
    - name: Run Rust smoke test
      env:
        PHONO3PY_TRACE_LANG: "1"
      run: |
        conda activate test
        pytest -sv test/phonon3/test_interaction_rust.py

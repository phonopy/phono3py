name: publish phono3py gh-pages

on:
  push:
    branches: [publish-gh-pages]

jobs:
  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v5
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: test
          auto-activate-base: false
          miniforge-version: latest
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          conda activate test
          conda install --yes python=${{ matrix.python-version }}
          conda install --yes \
            matplotlib-base pyyaml h5py numpy scipy spglib cmake \
            c-compiler cxx-compiler maturin \
            sphinx-book-theme linkify-it-py myst-parser sphinxcontrib-bibtex sphinxcontrib-mermaid ipython
      - name: Install symfc develop branch
        run: |
          conda activate test
          git clone https://github.com/symfc/symfc.git
          cd symfc
          pip install -e . -vvv
      - name: Build and install phonors
        run: |
          conda activate test
          git clone https://github.com/phonopy/phonors.git
          cd phonors
          maturin develop --release
      - name: Install phonopy main branch without C extension
        env:
          PHONOPY_NO_C_EXT: "1"
          CMAKE_GENERATOR: "Unix Makefiles"
        run: |
          conda activate test
          git clone https://github.com/phonopy/phonopy.git
          cd phonopy
          pip install -e . -vvv
      - name: Install phono3py without C extension
        env:
          PHONO3PY_NO_C_EXT: "1"
          CMAKE_GENERATOR: "Unix Makefiles"
        run: |
          conda activate test
          pip install -e . -vvv
      - name: Build
        run: |
          conda activate test
          sphinx-build doc docs_build

      - name: Deploy docs
        if: ${{ github.ref == 'refs/heads/publish-gh-pages' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs_build
          # deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
